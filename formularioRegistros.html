<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="stilos.css">
</head>
<body>
    <div class="left">
        <img src="" alt="back-left" class="logo">
        <h1><span class="silaba-1">Eco</span><span>Vig</span class='silaba-2'></h1>
    </div>
    <div class="contenedor">
        <div class="titulos">
        <h2>formularios de <br> registro </h2>
        </div>
        <div class="inputs">
            <form>
            
                <input type="text" placeholder="Nombre" id="nombre" required minlength="4">
                <input type="text" placeholder="Apellido" id="apelldio" required minlength="4">
                <input type="text" placeholder="D.N.I o Numero de identificación" id="nro_documento" required maxlength="9" minlength="8">
                <input type="email" id="correo" required placeholder="ejemplo@gmail.com" minlength="8">
                <input type="text" id="contaseaña" required placeholder="ingrese su contraseña" minlength="5"> 
                <input type="textarea" placeholder="Ingrese Aqui Su Domicilio" required minlength="10">
                <input type="text" placeholder="nombre de su establecimiento " required minlength="4">
                <input type="textarea" placeholder="ingrese la dirección de su establecimineto " required>
                <input type="number" placeholder="ingrese su numero de telefono " required minlength="11">
            </form>
        </div>
    </div>
    
</body>
</html>
